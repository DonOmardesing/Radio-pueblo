<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#000000">
<title>Don Omar Radio</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:#fff}
body{display:flex;justify-content:center;align-items:center;min-height:100vh}

.top-clock{position:fixed;top:10px;left:0;right:0;text-align:center;z-index:100;font-size:20px;font-weight:300;letter-spacing:2px;color:#ff7a14}

.container{position:relative;width:100vw;height:90vh;background:url('https://i.postimg.cc/JhRyzN2Q/IMG-4736.jpg') no-repeat center bottom;background-size:contain;padding-top:60px}

.btn{position:absolute;bottom:5%;width:28%;height:18%;cursor:pointer;z-index:10;border:3px solid rgba(255,69,0,0.9);border-radius:18px;animation:neonPulse 2s infinite alternate;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:bold;background:linear-gradient(135deg,rgba(0,0,0,0.95),rgba(40,0,0,0.92));backdrop-filter:blur(8px);transition:all 0.3s;text-decoration:none;color:#ff6b35;box-shadow:0 0 20px rgba(255,69,0,0.5)}
.btn:hover{transform:translateY(-5px) scale(1.05);border-color:rgba(255,69,0,1)}
@keyframes neonPulse{0%{border-color:rgba(255,69,0,0.6)}100%{border-color:rgba(255,69,0,1)}}
.btn-icon{font-size:40px;margin-bottom:10px}
.btn-text{font-family:'Arial Black',sans-serif;letter-spacing:2px;font-size:16px}
#btn-ron{left:4%}#btn-guaro{left:36%}#btn-viejos{left:68%}

@media (max-width:480px){
.btn{height:16%}
.btn-icon{font-size:32px}
.btn-text{font-size:13px}
}
</style>
</head>
<body>

<div class="top-clock" id="topClock">00:00:00</div>

<div class="container">
<a href="https://open.spotify.com/playlist/63FDBH6Adjor4HuSzu0pBe?si=HcvPeiCtTFKXnfHrpVNhvg&utm_source=copy-link&pi=kNqz121qR9SEi" class="btn" id="btn-ron" target="_blank">
<div class="btn-icon">🎵</div>
<div class="btn-text">RON AÑEJO</div>
</a>
<a href="https://open.spotify.com/playlist/2BEgpbPSIEHhj3x8eWqwIO?si=PEV9GjVlQS2iMQs9hzwdCg&utm_source=copy-link&pi=awQOpnl7Rj-PL" class="btn" id="btn-guaro" target="_blank">
<div class="btn-icon">🥃</div>
<div class="btn-text">GUARO HTA</div>
</a>
<a href="https://open.spotify.com/playlist/3mW1tGh25uqPzC2lpuEhnX?si=vGTNCkxARaWz8x8yYw7wuQ&utm_source=copy-link&pi=1kCp4njXTXysI" class="btn" id="btn-viejos" target="_blank">
<div class="btn-icon">💿</div>
<div class="btn-text">VIEJOS AMORES</div>
</a>
</div>

<script>
function pad(n){return n<10?'0'+n:''+n}
function updateClock(){var d=new Date();document.getElementById('topClock').textContent=pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds())}
updateClock();setInterval(updateClock,1000)
</script>

</body>
</html>
