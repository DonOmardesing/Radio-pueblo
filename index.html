<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#000000">
<title>Don Omar Radio</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:#fff}
body{display:flex;justify-content:center;align-items:center;min-height:100vh}

.top-clock{position:fixed;top:10px;left:0;right:0;text-align:center;z-index:100;font-size:20px;font-weight:300;letter-spacing:2px;color:#ff7a14}

.container{position:relative;width:100vw;height:90vh;background:url('https://i.postimg.cc/JhRyzN2Q/IMG-4736.jpg') no-repeat center bottom;background-size:contain;padding-top:60px}

/* TEXTO CURVADO SOBRE EL VINILO */
.vinyl-text-svg{
    position:absolute;
    top:48%;
    left:50%;
    transform:translate(-50%,-50%);
    width:80%;
    max-width:420px;
    z-index:5;
    pointer-events:none;
    overflow:visible;
}

.vinyl-text{
    font-family:'Arial Black',sans-serif;
    font-weight:bold;
    font-size:28px;
    letter-spacing:4px;
    fill:#fff;
    animation:neonGlow 2s infinite alternate;
}

@keyframes neonGlow{
    0%{
        filter:drop-shadow(0 0 3px #fff) drop-shadow(0 0 8px #fff) drop-shadow(0 0 15px #00d2ff) drop-shadow(0 0 30px #00d2ff) drop-shadow(0 0 45px #0080ff);
    }
    100%{
        filter:drop-shadow(0 0 5px #fff) drop-shadow(0 0 12px #fff) drop-shadow(0 0 25px #00f2ff) drop-shadow(0 0 50px #00f2ff) drop-shadow(0 0 70px #00f2ff);
    }
}

.btn{position:absolute;bottom:5%;width:28%;height:18%;cursor:pointer;z-index:10;border:3px solid rgba(255,69,0,0.9);border-radius:18px;animation:neonPulseBtn 2s infinite alternate;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:bold;background:linear-gradient(135deg,rgba(0,0,0,0.95),rgba(40,0,0,0.92));backdrop-filter:blur(8px);transition:all 0.3s;text-decoration:none;color:#ff6b35;box-shadow:0 0 20px rgba(255,69,0,0.5)}
.btn:hover{transform:translateY(-5px) scale(1.05);border-color:rgba(255,69,0,1)}
@keyframes neonPulseBtn{0%{border-color:rgba(255,69,0,0.6)}100%{border-color:rgba(255,69,0,1)}}
.btn-icon{font-size:40px;margin-bottom:10px}
.btn-text{font-family:'Arial Black',sans-serif;letter-spacing:2px;font-size:16px}
#btn-ron{left:4%}#btn-guaro{left:36%}#btn-viejos{left:68%}

@media (max-width:480px){
.vinyl-text{font-size:20px;letter-spacing:3px}
.btn{height:16%}
.btn-icon{font-size:32px}
.btn-text{font-size:13px}
}
</style>
</head>
<body>

<div class="top-clock" id="topClock">00:00:00</div>

<div class="container">

<!-- SVG con texto curvado siguiendo el vinilo -->
<svg class="vinyl-text-svg" viewBox="0 0 400 100" preserveAspectRatio="xMidYMid meet">
<defs>
<path id="vinylArc" d="M 30,90 Q 200,-20 370,90" fill="none"/>
</defs>
<text class="vinyl-text">
<textPath href="#vinylArc" startOffset="50%" text-anchor="middle">DonOmar_Radio</textPath>
</text>
</svg>

<a href="https://open.spotify.com/playlist/63
